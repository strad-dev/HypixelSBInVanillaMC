name: SkyBlock
version: '${project.version}'
main: misc.Plugin
api-version: '1.21.11'

commands:
  getopitems:
    description: Get insanely overpowered SkyBlock items!  Valid itemSets - combat, ingredient, summon
    usage: /getopitems [itemSet] <player>
  w:
    description: Whisper messages to another player!
    usage: /w [player] [message]
  tell:
    description: Whisper messages to another player!
    usage: /tell [player] [message]
  msg:
    description: Whisper messages to another player!
    usage: /msg [player] [message]
  locateplayer:
    description: Locate a player on the server!
    usage: /locateplayer [player]
  eq:
    description: View your equipment and current speed.
    usage: /eq
  resetwitherfight:
    description: Resets the status of the Wither Lords boss fight.  Useful if the boss was /kill'ed or otherwise dead in an unintended way.
    usage: /resetwitherfight
  m7tasactivatewitherfight:
    description: Utilized by the M7 TAS plugin to set the Wither Lords fight to active.  Also useful for admins to disable custom Withers (but why)
    usage: /m7tasactivatewitherfight
  say:
    description: Broadcast a message to the server
    usage: /say [message]
  me:
    description: Send an action message
    usage: /me [action]
  duel:
    description: Challenge a player to a 1v1.
    usage: /duel <player> | /duel accept
  joinarena:
    description: Teleport into the FFA arena.
    usage: /joinarena
  leavearena:
    description: Leave the FFA arena.
    usage: /leavearena
  stats:
    description: View PvP stats.
    usage: /stats [player]
  pvptop:
    description: View the PvP leaderboard.
    usage: /pvptop <ffa|1v1>
  pvploadout:
    description: Edit your PvP duel loadout.
    usage: /pvploadout [reset]

softdepend:
  - DiscordSRV