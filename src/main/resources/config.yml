# SkyBlock-in-Vanilla config.
# PvP is OFF by default so this plugin stays inert/standalone on non-pvp servers; enable + fill in
# the coordinates on the pvp server only.

chat:
  # Set false on the strad.dev network so the hub (StradNetworkPlugin) owns chat instead.
  enabled: true

pvp:
  ffa:
    enabled: false
    # TODO(user): set the FFA world + spawn + arena bounds + (optional) safe zone.
    world: world
    spawn: { x: 0.5, y: 100.0, z: 0.5, yaw: 0.0, pitch: 0.0 }
    bounds:
      min: [ -50.0, 0.0, -50.0 ]
      max: [ 50.0, 256.0, 50.0 ]
    safezone:
      enabled: false
      min: [ -5.0, 0.0, -5.0 ]
      max: [ 5.0, 256.0, 5.0 ]
  duel:
    enabled: false
    # TODO(user): set the duel world, the two player spawn corners, and the arena bounds.
    world: world
    countdown: 5
    arena:
      min: [ 100.0, 0.0, 100.0 ]
      max: [ 150.0, 256.0, 150.0 ]
    spawns:
      - { x: 105.5, y: 100.0, z: 125.5, yaw: -90.0, pitch: 0.0 }
      - { x: 145.5, y: 100.0, z: 125.5, yaw: 90.0, pitch: 0.0 }
  stats:
    enabled: false
    # Shared network-wide stats file. "../data/..." resolves to ~/data on the strad.dev box.
    file: "../data/pvp-stats.json"
