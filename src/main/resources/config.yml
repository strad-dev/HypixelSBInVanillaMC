# SkyBlock-in-Vanilla config.  There are a few options you can tweak here.

chat:
  # Enables a lightweight custom chat that bypasses Mojang chat reporting
  enabled: true

pvp:
  ffa:
    # Enables the Free-For-All PvP arena.
    enabled: false
    # Set the FFA world, spawnpoint, arena bounds, and (optional) safe zone.
    world: world
    spawn: { x: 0.5, y: 100.0, z: 0.5, yaw: 0.0, pitch: 0.0 }
    bounds:
      min: [ -50.0, 0.0, -50.0 ]
      max: [ 50.0, 256.0, 50.0 ]
    safezone:
      enabled: false
      min: [ -5.0, 0.0, -5.0 ]
      max: [ 5.0, 256.0, 5.0 ]
  duel:
    # Enables direct 1v1 duels.  Players can send duel requests to each other.
    enabled: false
    # Set the duel world, the two player spawn locations, and the arena bounds.  For best results, use an enclosed space with bedrock walls at least 2 blocks thick separate from the Free-For-All Arena.
    world: world
    countdown: 5
    arena:
      min: [ 100.0, 0.0, 100.0 ]
      max: [ 150.0, 256.0, 150.0 ]
    spawns:
      - { x: 105.5, y: 100.0, z: 125.5, yaw: -90.0, pitch: 0.0 }
      - { x: 145.5, y: 100.0, z: 125.5, yaw: 90.0, pitch: 0.0 }
  stats:
    # Enables stats tracking for duels (recommended).
    enabled: false
    file: "pvp-stats.json"
